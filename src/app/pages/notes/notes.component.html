<div class="container">

  <h2>📝 Simple Notes</h2>

  <div *ngIf="error" class="error">{{ error }}</div>

  <div class="create">
    <input [(ngModel)]="content" placeholder="Write a note..." (keyup.enter)="create()" />
    <button (click)="create()">Add</button>
  </div>

  <div *ngIf="loading" class="loading">Loading notes...</div>
  
  <div *ngIf="!loading && notes.length === 0" class="empty">
    No notes yet. Create your first note ✨
  </div>

  <ul class="notes">
    <li *ngFor="let n of notes">
      <span>{{ n.content }}</span>
      <button class="delete" (click)="remove(n.id)">✕</button>
    </li>
  </ul>

</div>
